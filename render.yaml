services:
  - type: web
    name: spree
    runtime: ruby
    plan: free
    buildCommand: bundle install && bundle exec rails assets:precompile && bundle exec rails db:prepare
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spree-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: spree-redis
          type: redis
          property: connectionString
      # - key: REDIS_CACHE_URL
      #   fromService:
      #     name: spree-redis-cache
      #     type: redis
      #     property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_LOG_LEVEL
        value: info
      # uncomment on plans with 2+ vCPUs (pro and up) to run one Puma process per vCPU;
      # a Spree process needs ~1GB RAM, so this doesn't fit free/starter instances
      # - key: WEB_CONCURRENCY
      #   value: "2"

  # uncomment to add background jobs, requires standard (paid) plan
  # - type: worker
  #   name: spree-worker
  #   runtime: ruby
  #   plan: standard
  #   buildCommand: bundle install && bundle exec rails assets:precompile
  #   startCommand: bundle exec sidekiq
  #   envVars:
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: spree-db
  #         property: connectionString
  #     - key: REDIS_URL
  #       fromService:
  #         name: spree-redis
  #         type: redis
  #         property: connectionString
  #     - key: SECRET_KEY_BASE
  #       fromService:
  #         name: spree
  #         type: web
  #         envVarKey: SECRET_KEY_BASE
  #     - key: SIDEKIQ_CONCURRENCY
  #       value: "10"
  #     - key: RAILS_MAX_THREADS
  #       value: "12"
  #     - key: MALLOC_ARENA_MAX
  #       value: "2"

  - type: redis
    name: spree-redis
    plan: free
    # maxmemoryPolicy: noeviction
    ipAllowList: []

  # uncomment to enable dedicated cache redis
  # - type: redis
  #   name: spree-redis-cache
  #   plan: free
  #   maxmemoryPolicy: allkeys-lru
  #   ipAllowList: []

databases:
  - name: spree-db
    plan: free
    databaseName: spree
    postgresMajorVersion: "18"
    ipAllowList: []
