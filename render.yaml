services:
  - type: web
    name: spree
    runtime: ruby
    plan: starter
    buildCommand: bundle install && bundle exec rails assets:precompile && bundle exec rails db:prepare
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spree-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: spree-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_LOG_LEVEL
        value: info

  - type: worker
    name: spree-worker
    runtime: ruby
    plan: starter
    buildCommand: bundle install && bundle exec rails assets:precompile
    startCommand: bundle exec sidekiq
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spree-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: spree-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY_BASE
        fromService:
          name: spree
          type: web
          envVarKey: SECRET_KEY_BASE

  - type: redis
    name: spree-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: spree-db
    plan: starter
    databaseName: spree
    postgresMajorVersion: "18"
    ipAllowList: []
